services:
  - type: web
    name: hdfs-anomaly-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # you fill this in Render dashboard
      - key: RAG_CSV_PATH
        value: rag_documents.csv
      - key: CHROMA_DIR
        value: ./chroma_db
      - key: EMBED_MODEL
        value: all-MiniLM-L6-v2
    autoDeploy: true
